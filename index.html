		<div id="playSoundBtn"><img src="toolgun.png" /></div>

		<script>
			const sounds = [
			    'https://files.catbox.moe/uxlz92.wav',
			    'https://files.catbox.moe/hwco8i.wav',
			];

			// Funktion, um einen zufälligen Sound abzuspielen
			function playRandomSound() {
			    // Zufälligen Index aus dem Array wählen
			    const randomIndex = Math.floor(Math.random() * sounds.length);
			    const audio = new Audio(sounds[randomIndex]);
			    audio.play();
			}

			// Event Listener für den Button
			document.getElementById('playSoundBtn').addEventListener('click', playRandomSound);
		</script>
